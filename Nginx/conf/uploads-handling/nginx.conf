# /etc/nginx/conf.d/uploads.conf
server {
    listen 80;
    server_name company.com;
    root /var/www/demo;
    index index.html;

    # Limit upload size
    client_max_body_size 10M;

    # Serve normal files
    location / {
        try_files $uri $uri/ =404;
        autoindex off;
    }

    # Uploads — read only, no execution
    location /uploads/ {
        alias /var/www/demo/uploads/;

        # Block ALL executable files
        location ~* \.(php|sh|py|rb|pl|exe)$ {
            deny all;
        }

        # Allow only safe file types
        location ~* \.(jpg|jpeg|png|gif|pdf|doc)$ {
            try_files $uri =404;
        }
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}