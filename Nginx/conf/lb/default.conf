# /home/bonny/CLAUDE/Nginx/conf/load_balancer/conf.d/default.conf

# ─────────────────────────────────────────
# Rate Limiting Zones
# ─────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=static:10m  rate=50r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─────────────────────────────────────────
# Upstream Blocks (ready for scaling)
# ─────────────────────────────────────────
upstream droll_backend {
    least_conn;
    server droll:80       max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream dreamy_backend {
    least_conn;
    server dreamy:80      max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream interio_backend {
    least_conn;
    server interio:80     max_fails=3 fail_timeout=30s;
    keepalive 32;
}


# ─────────────────────────────────────────
# Droll
# ─────────────────────────────────────────
server {
    listen 80;
    server_name droll.local;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"         always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection "1; mode=block"     always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Rate limiting
    limit_req  zone=general burst=20 nodelay;
    limit_conn conn_limit 20;

    # Block common attacks
    location ~* \.(php|sh|py|rb|pl|exe)$ {
        deny all;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    location / {
        proxy_pass         http://droll_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         4 16k;
    }

    

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2)$ {
        proxy_pass         http://droll_backend;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, no-transform";
        limit_req          zone=static burst=50 nodelay;
    }
}


