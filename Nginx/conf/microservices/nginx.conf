# Each team has their OWN nginx container
# with their OWN config mounted via volume

# Team A — /conf.d/team-a.conf
server {
    listen 80;
    server_name _;
    root /var/www/team-a;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Block executable uploads
    location ~* \.(php|sh|py)$ {
        deny all;
    }
}